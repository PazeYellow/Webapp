<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Banlist System</title>
<script src="config.js"></script>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#0d0d0d;
    color:#eee;
}

header {
    text-align:center;
    padding:20px;
    font-size:22px;
    color:#d4af37;
    letter-spacing:2px;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:10px;
}

.section {
    background:#1a1a1a;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
}

.section-title {
    color:#d4af37;
    margin:15px 0 10px;
    font-size:14px;
    border-bottom:1px solid #333;
    padding-bottom:5px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

.card {
    background:#222;
    border-radius:8px;
    overflow:hidden;
    text-align:center;
    position:relative;
}

.card img {
    width:100%;
}

.name {
    font-size:11px;
    padding:4px;
}

.controls {
    display:none;
    flex-direction:column;
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.85);
}

.controls button {
    font-size:10px;
    border:none;
    padding:3px;
    cursor:pointer;
}

.del { background:#8b0000; color:white; }
.mv { background:#d4af37; color:black; }

.admin {
    display:none;
    background:#111;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

input,select,textarea {
    width:100%;
    margin:5px 0;
    padding:8px;
    background:#222;
    color:white;
    border:1px solid #333;
}

button {
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#d4af37;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<header>YGO BANLIST SYSTEM</header>

<div class="container">

<!-- BANLIST -->
<div class="section" id="forbidden"></div>
<div class="section" id="limited"></div>
<div class="section" id="semi_limited"></div>

<button onclick="login()">ADMIN LOGIN</button>

<div id="admin" class="admin">

<h3>TCG SEARCH</h3>
<input id="searchInput" placeholder="Search card">
<button onclick="searchTCG()">Search</button>
<div id="results"></div>
<p id="selected"></p>

<select id="tcgStatus">
<option value="forbidden">Forbidden</option>
<option value="limited">Limited</option>
<option value="semi_limited">Semi-Limited</option>
</select>

<button onclick="addTCG()">Add Official</button>

<hr>

<h3>CUSTOM CARD</h3>

<input id="cName" placeholder="Name">
<input id="cType" placeholder="Type">
<textarea id="cEffect" placeholder="Effect"></textarea>
<input id="cImg" placeholder="Image">

<select id="cStatus">
<option value="forbidden">Forbidden</option>
<option value="limited">Limited</option>
<option value="semi_limited">Semi-Limited</option>
</select>

<button onclick="addCustom()">Add Custom</button>

</div>

</div>

<script>

let cache = null;
let admin = false;
let selectedTCG = null;

const BIN = CONFIG.BIN_ID;
const KEY = CONFIG.API_KEY;
const ACCESS = CONFIG.ACCESS_KEY;

/* ---------------- LOAD ---------------- */
async function load(){

    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN}/latest`, {
        headers:{
            "X-Master-Key":KEY,
            "X-Access-Key":ACCESS
        }
    });

    const data = await res.json();
    cache = data.record;

    ensure();
    render();
}

/* ---------------- SAFE INIT ---------------- */
function ensure(){
    ["forbidden","limited","semi_limited"].forEach(k=>{
        if(!Array.isArray(cache[k])) cache[k]=[];
    });
}

/* ---------------- CATEGORY ---------------- */
function getCategory(card){

    const t = (card.type || "").toLowerCase();

    if(t.includes("fusion")) return "Fusion";
    if(t.includes("synchro")) return "Synchro";
    if(t.includes("xyz")) return "Xyz";
    if(t.includes("link")) return "Link";
    if(t.includes("ritual")) return "Ritual";
    if(t.includes("spell")) return "Spell";
    if(t.includes("trap")) return "Trap";

    if(t.includes("effect")) return "Effect Monster";

    return "Normal Monster";
}

/* ---------------- SORT ---------------- */
function sortA(a,b){
    return a.name.localeCompare(b.name);
}

/* ---------------- RENDER ---------------- */
function render(){

    ["forbidden","limited","semi_limited"].forEach(zone=>{

        const root = document.getElementById(zone);
        root.innerHTML = "";

        const groups = {};

        cache[zone].forEach(c=>{
            const cat = getCategory(c);
            if(!groups[cat]) groups[cat]=[];
            groups[cat].push(c);
        });

        Object.keys(groups).forEach(group=>{

            const title = document.createElement("div");
            title.className="section-title";
            title.textContent=group;

            const grid = document.createElement("div");
            grid.className="grid";

            groups[group].sort(sortA).forEach(card=>{

                const el = document.createElement("div");
                el.className="card";

                el.innerHTML=`
                    <img src="${card.image||""}">
                    <div class="name">${card.name}</div>
                    <div class="controls"></div>
                `;

                if(admin){

                    const controls = el.querySelector(".controls");

                    const del = document.createElement("button");
                    del.className="del";
                    del.textContent="Delete";

                    del.onclick=()=>{
                        cache[zone]=cache[zone].filter(c=>c!==card);
                        save();
                        render();
                    };

                    const mv = document.createElement("button");
                    mv.className="mv";
                    mv.textContent="Move";

                    mv.onclick=()=>{
                        const order=["forbidden","limited","semi_limited"];
                        const i=order.indexOf(zone);
                        const next=order[(i+1)%3];

                        cache[zone]=cache[zone].filter(c=>c!==card);
                        cache[next].push(card);

                        save();
                        render();
                    };

                    controls.style.display="flex";
                    controls.appendChild(mv);
                    controls.appendChild(del);
                }

                grid.appendChild(el);
            });

            root.appendChild(title);
            root.appendChild(grid);
        });
    });
}

/* ---------------- SAVE ---------------- */
async function save(){

    await fetch(`https://api.jsonbin.io/v3/b/${BIN}`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            "X-Master-Key":KEY,
            "X-Access-Key":ACCESS
        },
        body:JSON.stringify(cache)
    });
}

/* ---------------- LOGIN ---------------- */
function login(){
    if(prompt("Password")===CONFIG.ADMIN_PASS){
        admin=true;
        document.getElementById("admin").style.display="block";
        render();
    }
}

/* ---------------- TCG ---------------- */
async function searchTCG(){

    const q=searchInput.value;

    const res=await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(q)}`);
    const data=await res.json();

    results.innerHTML="";

    data.data.slice(0,10).forEach(c=>{

        const img=document.createElement("img");
        img.src=c.card_images[0].image_url_small;
        img.width=70;

        img.onclick=()=>{
            selectedTCG=c;
            selected.textContent=c.name;
        };

        results.appendChild(img);
    });
}

/* ---------------- ADD TCG ---------------- */
function addTCG(){

    cache[tcgStatus.value].push({
        name:selectedTCG.name,
        type:selectedTCG.type,
        image:selectedTCG.card_images[0].image_url
    });

    save();
    render();
}

/* ---------------- CUSTOM ---------------- */
function addCustom(){

    cache[cStatus.value].push({
        name:cName.value,
        type:cType.value,
        effect:cEffect.value,
        image:cImg.value
    });

    save();
    render();
}

load();

</script>

</body>
</html>
