<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Custom Banlist Manager</title>
<script src="config.js"></script>

<style>
:root { --dark:#121212; --gold:#d4af37; --red:#8b0000; --card-bg:#1e1e1e; }
body { font-family:'Segoe UI'; background:var(--dark); color:#eee; margin:0; padding:10px; }
.container { max-width:900px; margin:auto; }

.section { background:var(--card-bg); padding:15px; border-radius:12px; margin-bottom:25px; }
.forbidden { border-top:5px solid var(--red); }
.limited { border-top:5px solid orange; }
.semi { border-top:5px solid var(--gold); }

.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:10px; }
.card-item { background:#252525; border-radius:5px; text-align:center; font-size:.75em; }
.card-item img { width:100%; }

.admin-panel { display:none; background:#2a2a2a; padding:20px; margin-top:30px; }
button { background:var(--gold); padding:10px; border:none; cursor:pointer; width:100%; }
.login-btn { margin-top:30px; opacity:.3; background:none; border:1px solid #444; color:white; }
</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;color:var(--gold)">SYSTEM BANLIST</h1>

<div id="banlist-content">
<div class="section forbidden"><h2>Forbidden <span id="count-forbidden"></span></h2><div id="forbidden-list" class="card-grid"></div></div>
<div class="section limited"><h2>Limited <span id="count-limited"></span></h2><div id="limited-list" class="card-grid"></div></div>
<div class="section semi"><h2>Semi-Limited <span id="count-semi"></span></h2><div id="semi-list" class="card-grid"></div></div>
</div>

<button class="login-btn" onclick="showLogin()">[ADMIN LOGIN]</button>

<div id="admin-area" class="admin-panel">
<h2>Database Editor</h2>

<input id="custName" placeholder="Card Name">
<select id="custStatus">
<option value="forbidden">Forbidden</option>
<option value="limited">Limited</option>
<option value="semi_limited">Semi-Limited</option>
</select>

<button onclick="addCustom()">Add Card</button>
</div>

</div>

<script>
const BIN_ID = CONFIG.BIN_ID;
const API_KEY = CONFIG.API_KEY;
const ADMIN_PASS = CONFIG.ADMIN_PASS;

async function loadBanlist() {
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: {
                'X-Master-Key': API_KEY
            }
        });

        const data = await res.json();
        renderList(data.record);

    } catch (e) {
        console.error(e);
    }
}

function renderList(list) {
    ["forbidden","limited","semi_limited"].forEach(status => {
        const id = status === "semi_limited" ? "semi-list" : status + "-list";
        const el = document.getElementById(id);

        if (!list[status]) list[status] = [];

        el.innerHTML = list[status].map(c => `
            <div class="card-item">
                <img src="${c.image || ''}">
                <div>${c.name}</div>
            </div>
        `).join("");
    });
}

async function addCustom() {
    const name = document.getElementById("custName").value;
    const status = document.getElementById("custStatus").value;

    if (!name) return alert("Name required");

    const card = {
        name: name,
        image: ""
    };

    await pushToDB(card, status);
}

async function pushToDB(cardObj, status) {
    try {
        // GET CURRENT DATA
        const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: {
                'X-Master-Key': API_KEY
            }
        });

        const getData = await getRes.json();
        let record = getData.record;

        // ENSURE STRUCTURE
        if (!record.forbidden) record.forbidden = [];
        if (!record.limited) record.limited = [];
        if (!record.semi_limited) record.semi_limited = [];

        // ADD CARD
        record[status].push(cardObj);

        console.log("UPDATING:", record);

        // PUT UPDATE
        const putRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "X-Master-Key": API_KEY,
                "X-Bin-Versioning": "false"
            },
            body: JSON.stringify(record)
        });

        const result = await putRes.json();
        console.log("RESULT:", result);

        if (!putRes.ok) {
            alert("ERROR: " + result.message);
            return;
        }

        alert("Updated!");
        location.reload();

    } catch (err) {
        console.error(err);
        alert("System error");
    }
}

function showLogin() {
    if (prompt("Password?") === ADMIN_PASS) {
        document.getElementById("admin-area").style.display = "block";
    }
}

loadBanlist();
</script>

</body>
</html>
