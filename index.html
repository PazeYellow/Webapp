<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banlist Viewer</title>

<script>document.write('<script src="config.js?v=' + new Date().getTime() + '"><\/script>');</script>

<style>
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#0d0d0d;
    color:#eee;
}

header {
    text-align:center;
    padding:20px;
    color:#4da6ff; /* 🔵 changed from gold */
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
}

.container { max-width:1100px; margin:auto; padding:10px; }

.section {
    background:#1a1a1a;
    padding:15px;
    margin-bottom:40px;
    border-radius:10px;
    border:1px solid #333;
}

.status-header {
    font-size:20px;
    border-left:5px solid #4da6ff; /* 🔵 */
    padding-left:10px;
    margin-bottom:15px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:12px;
}

.card {
    background:#222;
    border-radius:8px;
    overflow:hidden;
    text-align:center;
    border:1px solid #333;
}

.card img { width:100%; }

.name {
    font-size:10px;
    padding:6px;
}
</style>
</head>

<body>

<header>YGO BANLIST (VIEW ONLY)</header>

<div class="container">
    <div class="section">
        <div class="status-header">Forbidden</div>
        <div id="forbidden" class="grid"></div>
    </div>

    <div class="section">
        <div class="status-header">Limited</div>
        <div id="limited" class="grid"></div>
    </div>

    <div class="section">
        <div class="status-header">Semi-Limited</div>
        <div id="semi_limited" class="grid"></div>
    </div>
</div>

<script>
let cache = null;

window.onload = load;

async function load() {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
        headers: {
            "X-Access-Key": CONFIG.ACCESS_KEY
        }
    });

    const data = await res.json();
    cache = data.record;

    render();
}

function render() {
    ["forbidden","limited","semi_limited"].forEach(zone => {
        const grid = document.getElementById(zone);
        grid.innerHTML = "";

        cache[zone].forEach(card => {
            const el = document.createElement("div");
            el.className = "card";

            el.innerHTML = `
                <img src="${card.image}">
                <div class="name">${card.name}</div>
            `;
            grid.appendChild(el);
        });
    });
}
</script>

</body>
</html>
