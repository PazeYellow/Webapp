<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Banlist Manager</title>
<script src="config.js"></script>

<style>
body { font-family:Segoe UI; background:#121212; color:#eee; padding:10px; }
.container { max-width:1000px; margin:auto; }

.section { background:#1e1e1e; padding:15px; margin-bottom:20px; border-radius:10px; }

.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; }

.card {
    background:#222;
    border-radius:6px;
    overflow:hidden;
    text-align:center;
    font-size:.7em;
    position:relative;
}

.card img { width:100%; }

.controls {
    display:flex;
    flex-direction:column;
    gap:3px;
    padding:5px;
}

button {
    cursor:pointer;
    border:none;
    padding:5px;
    font-size:10px;
}

.del { background:#8b0000; color:white; }
.mv { background:#d4af37; }
.admin { display:none; background:#2a2a2a; padding:20px; margin-top:20px; }

input,select,textarea { width:100%; margin:5px 0; padding:8px; background:#333; color:white; }
</style>
</head>

<body>

<div class="container">

<h1 style="color:gold;text-align:center;">BANLIST SYSTEM</h1>

<div class="section">
<h2>Forbidden</h2>
<div id="forbidden" class="card-grid"></div>
</div>

<div class="section">
<h2>Limited</h2>
<div id="limited" class="card-grid"></div>
</div>

<div class="section">
<h2>Semi-Limited</h2>
<div id="semi_limited" class="card-grid"></div>
</div>

<button onclick="login()">ADMIN LOGIN</button>

<div id="admin" class="admin">

<h2>Add Custom Card</h2>

<input id="name" placeholder="Name">
<input id="type" placeholder="Type">
<textarea id="effect" placeholder="Effect"></textarea>
<input id="img" placeholder="Image URL">

<select id="status">
<option value="forbidden">Forbidden</option>
<option value="limited">Limited</option>
<option value="semi_limited">Semi-Limited</option>
</select>

<button onclick="addCard()">Add</button>

</div>

</div>

<script>

let dataCache = null;
let isAdmin = false;

// LOAD
async function load() {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
        headers: {
            "X-Master-Key": CONFIG.API_KEY,
            "X-Access-Key": CONFIG.ACCESS_KEY
        }
    });

    const json = await res.json();
    dataCache = json.record;

    sanitize();
    render();
}

// CLEAN DATA
function sanitize(){
    ["forbidden","limited","semi_limited"].forEach(k=>{
        if(!Array.isArray(dataCache[k])) dataCache[k]=[];
        dataCache[k] = dataCache[k].filter(Boolean);
    });
}

// SAVE
async function save(){
    await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            "X-Master-Key":CONFIG.API_KEY,
            "X-Access-Key":CONFIG.ACCESS_KEY
        },
        body:JSON.stringify(dataCache)
    });
}

// RENDER (WITH EVENT LISTENERS)
function render(){

    ["forbidden","limited","semi_limited"].forEach(listName=>{

        const el = document.getElementById(listName);
        el.innerHTML = "";

        dataCache[listName].forEach(card=>{

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${card.image || ""}">
                <div>${card.name}</div>
            `;

            if(isAdmin){

                const controls = document.createElement("div");
                controls.className="controls";

                const del = document.createElement("button");
                del.className="del";
                del.textContent="DELETE";

                del.onclick = async () => {
                    dataCache[listName] = dataCache[listName].filter(c => c.id !== card.id);
                    sanitize();
                    await save();
                    render();
                };

                const moveF = document.createElement("button");
                moveF.className="mv";
                moveF.textContent="→ F";

                moveF.onclick = () => move(card,listName,"forbidden");

                const moveL = document.createElement("button");
                moveL.className="mv";
                moveL.textContent="→ L";

                moveL.onclick = () => move(card,listName,"limited");

                const moveS = document.createElement("button");
                moveS.className="mv";
                moveS.textContent="→ S";

                moveS.onclick = () => move(card,listName,"semi_limited");

                controls.appendChild(moveF);
                controls.appendChild(moveL);
                controls.appendChild(moveS);
                controls.appendChild(del);

                div.appendChild(controls);
            }

            el.appendChild(div);
        });
    });
}

// MOVE
async function move(card,from,to){

    dataCache[from] = dataCache[from].filter(c=>c.id!==card.id);
    dataCache[to].push(card);

    sanitize();
    await save();
    render();
}

// LOGIN
function login(){
    if(prompt("Password") === CONFIG.ADMIN_PASS){
        isAdmin = true;
        document.getElementById("admin").style.display="block";
        render();
    }
}

// ADD CARD
async function addCard(){

    const card = {
        id: crypto.randomUUID(),
        name: name.value,
        type: type.value,
        effect: effect.value,
        image: img.value
    };

    dataCache[status.value].push(card);

    sanitize();
    await save();
    render();
}

load();

</script>

</body>
</html>
