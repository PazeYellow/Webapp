<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Banlist System</title>
<script src="config.js"></script>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#0d0d0d;
    color:#eee;
}

header {
    text-align:center;
    padding:20px;
    font-size:24px;
    color:#d4af37;
    letter-spacing:2px;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

.section {
    background:#1a1a1a;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.section h2 {
    margin:0 0 10px;
    font-size:16px;
    color:#d4af37;
}

.card {
    background:#222;
    border-radius:8px;
    overflow:hidden;
    text-align:center;
    position:relative;
}

.card img {
    width:100%;
}

.card-name {
    padding:5px;
    font-size:12px;
}

.controls {
    display:none;
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.8);
    flex-direction:column;
}

.controls button {
    border:none;
    font-size:10px;
    padding:4px;
    cursor:pointer;
}

.del { background:#8b0000; color:white; }
.mv { background:#d4af37; color:black; }

.admin {
    display:none;
    background:#111;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

input,select,textarea {
    width:100%;
    margin:5px 0;
    padding:8px;
    background:#222;
    color:white;
    border:1px solid #333;
}

button {
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#d4af37;
    border:none;
    cursor:pointer;
}

.search-grid {
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:10px 0;
}

.search-grid img {
    width:80px;
    cursor:pointer;
    border:2px solid transparent;
}

.search-grid img:hover {
    border-color:#d4af37;
}
</style>
</head>

<body>

<header>YGO BANLIST SYSTEM</header>

<div class="container">

<div class="section">
<h2>Forbidden</h2>
<div id="forbidden" class="grid"></div>
</div>

<div class="section">
<h2>Limited</h2>
<div id="limited" class="grid"></div>
</div>

<div class="section">
<h2>Semi-Limited</h2>
<div id="semi_limited" class="grid"></div>
</div>

<button onclick="login()">ADMIN LOGIN</button>

<div id="admin" class="admin">

<h3>TCG SEARCH</h3>
<input id="searchInput" placeholder="Search card">
<button onclick="searchTCG()">Search</button>
<div id="searchResults" class="search-grid"></div>
<p id="selectedCard"></p>

<select id="tcgStatus">
<option value="forbidden">Forbidden</option>
<option value="limited">Limited</option>
<option value="semi_limited">Semi-Limited</option>
</select>

<button onclick="addTCG()">Add Official Card</button>

<hr>

<h3>CUSTOM CARD</h3>
<input id="cName" placeholder="Name">
<input id="cType" placeholder="Type">
<textarea id="cEffect" placeholder="Effect"></textarea>
<input id="cImg" placeholder="Image URL">

<select id="cStatus">
<option value="forbidden">Forbidden</option>
<option value="limited">Limited</option>
<option value="semi_limited">Semi-Limited</option>
</select>

<button onclick="addCustom()">Add Custom</button>

</div>

</div>

<script>

let cache = null;
let selected = null;
let admin = false;

const BIN = CONFIG.BIN_ID;
const KEY = CONFIG.API_KEY;
const ACCESS = CONFIG.ACCESS_KEY;

// ---------------- LOAD ----------------
async function load() {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN}/latest`, {
        headers:{
            "X-Master-Key":KEY,
            "X-Access-Key":ACCESS
        }
    });

    const data = await res.json();
    cache = data.record;

    render();
}

// ---------------- RENDER ----------------
function render() {

    ["forbidden","limited","semi_limited"].forEach(type => {

        const el = document.getElementById(type);
        el.innerHTML = "";

        (cache[type] || []).forEach((c, index) => {

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="${c.image || ""}">
                <div class="card-name">${c.name}</div>
                <div class="controls"></div>
            `;

            const controls = card.querySelector(".controls");

            if(admin){

                const del = document.createElement("button");
                del.textContent = "Delete";
                del.className = "del";

                del.onclick = () => deleteCard(type, index);

                const mv = document.createElement("button");
                mv.textContent = "Move";
                mv.className = "mv";

                mv.onclick = () => moveCard(type, index);

                controls.style.display = "flex";
                controls.appendChild(mv);
                controls.appendChild(del);
            }

            el.appendChild(card);
        });
    });
}

// ---------------- LOGIN ----------------
function login() {
    if(prompt("Password") === CONFIG.ADMIN_PASS){
        admin = true;
        document.getElementById("admin").style.display = "block";
        render();
    }
}

// ---------------- SAVE ----------------
async function save() {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN}`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            "X-Master-Key":KEY,
            "X-Access-Key":ACCESS
        },
        body:JSON.stringify(cache)
    });
}

// ---------------- DELETE ----------------
function deleteCard(type,index){
    cache[type].splice(index,1);
    save();
    render();
}

// ---------------- MOVE ----------------
function moveCard(type,index){

    const order = ["forbidden","limited","semi_limited"];
    const current = order.indexOf(type);
    const next = order[(current + 1) % 3];

    const card = cache[type].splice(index,1)[0];
    cache[next].push(card);

    save();
    render();
}

// ---------------- ADD CUSTOM ----------------
function addCustom(){

    const card = {
        name:cName.value,
        type:cType.value,
        effect:cEffect.value,
        image:cImg.value
    };

    cache[cStatus.value].push(card);

    save();
    render();
}

// ---------------- TCG ----------------
async function searchTCG(){

    const q = searchInput.value;

    const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(q)}`);
    const data = await res.json();

    searchResults.innerHTML = "";

    data.data.slice(0,10).forEach(card => {

        const img = document.createElement("img");
        img.src = card.card_images[0].image_url_small;

        img.onclick = () => {
            selected = card;
            selectedCard.textContent = card.name;
        };

        searchResults.appendChild(img);
    });
}

// ---------------- ADD TCG ----------------
function addTCG(){

    cache[tcgStatus.value].push({
        name:selected.name,
        image:selected.card_images[0].image_url
    });

    save();
    render();
}

load();

</script>

</body>
</html>
