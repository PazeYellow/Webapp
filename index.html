<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banlist System - Manual Sort</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#0d0d0d;
    color:#eee;
}

header {
    text-align:center;
    padding:20px;
    color:#d4af37;
    font-size:24px;
    letter-spacing:2px;
    font-weight: bold;
}

.container { max-width:1100px; margin:auto; padding:10px; }

.section {
    background:#1a1a1a;
    padding:15px;
    margin-bottom:40px;
    border-radius:10px;
    border: 1px solid #333;
}

.status-header {
    font-size: 22px;
    color: #fff;
    text-transform: uppercase;
    border-left: 5px solid #d4af37;
    padding-left: 15px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #222, transparent);
}

/* Grid now acts as the sortable container */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:12px;
    min-height: 50px;
}

.card {
    background:#222;
    border-radius:8px;
    overflow:hidden;
    text-align:center;
    position:relative;
    border: 1px solid #333;
    cursor: default;
}

/* Admin-only drag cursor */
.admin-mode .card { cursor: grab; }
.admin-mode .card:active { cursor: grabbing; }

.card img { width:100%; display: block; pointer-events: none; }

.name {
    font-size:10px;
    padding:6px;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
    pointer-events: none;
}

.controls {
    display:none;
    background:rgba(0,0,0,0.9);
}

.controls button {
    width:100%;
    font-size:10px;
    border:none;
    padding:5px;
    cursor:pointer;
}

.del { background:#8b0000; color:white; }
.mv { background:#d4af37; color:black; margin-bottom:1px; }

.admin { display:none; background:#111; padding:20px; border-radius:10px; margin-top:20px; border: 1px dashed #444; }

input,select,textarea {
    width:100%;
    margin:5px 0;
    padding:10px;
    background:#222;
    color:white;
    border:1px solid #333;
    box-sizing: border-box;
}

button {
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#d4af37;
    border:none;
    cursor:pointer;
    font-weight: bold;
    text-transform: uppercase;
}

#results img { margin: 5px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; height: 80px; }
#results img:hover { border-color: #d4af37; }

/* Dragging Styles */
.sortable-ghost { opacity: 0.4; border: 2px dashed #d4af37; }
</style>
</head>

<body>

<header>YGO BANLIST SYSTEM</header>

<div class="container" id="main-content">
    <div class="section">
        <div class="status-header">Forbidden</div>
        <div id="forbidden" class="grid"></div>
    </div>
    
    <div class="section">
        <div class="status-header">Limited</div>
        <div id="limited" class="grid"></div>
    </div>

    <div class="section">
        <div class="status-header">Semi-Limited</div>
        <div id="semi_limited" class="grid"></div>
    </div>

    <button onclick="login()">ADMIN LOGIN</button>

    <div id="admin-panel" class="admin">
        <h3>TCG DATABASE SEARCH</h3>
        <input id="searchInput" placeholder="Search card name...">
        <button onclick="searchTCG()">Search</button>
        <div id="results"></div>
        <p id="selected" style="color:#d4af37; font-size: 14px; font-weight: bold;"></p>

        <select id="tcgStatus">
            <option value="forbidden">Forbidden</option>
            <option value="limited">Limited</option>
            <option value="semi_limited">Semi-Limited</option>
        </select>
        <button onclick="addTCG()">Add to Banlist</button>

        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">

        <h3>CUSTOM CARD</h3>
        <input id="cName" placeholder="Card Name">
        <input id="cType" placeholder="Card Type (e.g. Spell, Fusion, etc)">
        <input id="cImg" placeholder="Image URL">

        <select id="cStatus">
            <option value="forbidden">Forbidden</option>
            <option value="limited">Limited</option>
            <option value="semi_limited">Semi-Limited</option>
        </select>

        <button onclick="addCustom()">Add Custom</button>
    </div>
</div>

<script>
let cache = null;
let admin = false;
let selectedTCG = null;
let sortables = [];

const BIN = CONFIG.BIN_ID;
const KEY = CONFIG.API_KEY;
const ACCESS = CONFIG.ACCESS_KEY;

/* ---------------- LOAD ---------------- */
async function load() {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN}/latest`, {
        headers: { "X-Master-Key": KEY, "X-Access-Key": ACCESS }
    });
    const data = await res.json();
    cache = data.record;
    ensure();
    render();
}

function ensure() {
    ["forbidden","limited","semi_limited"].forEach(k => {
        if (!Array.isArray(cache[k])) cache[k] = [];
    });
}

/* ---------------- RENDER ---------------- */
function render() {
    // Clear existing sortable instances to prevent memory leaks
    sortables.forEach(s => s.destroy());
    sortables = [];

    ["forbidden","limited","semi_limited"].forEach(zone => {
        const grid = document.getElementById(zone);
        grid.innerHTML = "";

        cache[zone].forEach((card, index) => {
            const el = document.createElement("div");
            el.className = "card";
            el.dataset.id = index; // Keep track of original index

            el.innerHTML = `
                <img src="${card.image}" onerror="this.src='https://via.placeholder.com/150x220?text=No+Image'">
                <div class="name">${card.name}</div>
                <div class="controls" id="ctrl-${zone}-${index}">
                    <button class="mv" onclick="moveStatus('${zone}', ${index})">Move Status</button>
                    <button class="del" onclick="removeCard('${zone}', ${index})">Remove</button>
                </div>
            `;

            if (admin) {
                el.querySelector(".controls").style.display = "block";
            }

            grid.appendChild(el);
        });

        // Initialize Drag and Drop if Admin
        if (admin) {
            sortables.push(new Sortable(grid, {
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: () => {
                    updateCacheFromDOM(zone);
                }
            }));
        }
    });

    if(admin) document.getElementById("main-content").classList.add("admin-mode");
}

/* ---------------- MANUAL SORT UPDATE ---------------- */
function updateCacheFromDOM(zone) {
    const grid = document.getElementById(zone);
    const newOrder = [];
    const items = grid.querySelectorAll('.card');
    
    // Create a temporary copy of the zone
    const currentZoneCards = [...cache[zone]];
    
    items.forEach(item => {
        const name = item.querySelector('.name').textContent;
        // Find the matching card object by name (or we could use a unique ID)
        const cardObj = currentZoneCards.find(c => c.name === name);
        if(cardObj) newOrder.push(cardObj);
    });

    cache[zone] = newOrder;
    save();
}

/* ---------------- ACTIONS ---------------- */
function moveStatus(zone, index) {
    const order = ["forbidden","limited","semi_limited"];
    const next = order[(order.indexOf(zone)+1)%3];
    const card = cache[zone].splice(index, 1)[0];
    cache[next].push(card);
    save();
    render();
}

function removeCard(zone, index) {
    if(!confirm("Remove this card?")) return;
    cache[zone].splice(index, 1);
    save();
    render();
}

async function save() {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN}`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            "X-Master-Key":KEY,
            "X-Access-Key":ACCESS
        },
        body: JSON.stringify(cache)
    });
}

/* ---------------- ADMIN ---------------- */
function login(){
    const pass = prompt("Admin Password");
    if(pass === CONFIG.ADMIN_PASS){
        admin = true;
        document.getElementById("admin-panel").style.display="block";
        render();
    }
}

/* ---------------- API ---------------- */
async function searchTCG(){
    const q = document.getElementById("searchInput").value;
    const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(q)}`);
    const data = await res.json();
    const results = document.getElementById("results");
    results.innerHTML="";

    data.data?.slice(0,10).forEach(c=>{
        const img=document.createElement("img");
        img.src=c.card_images[0].image_url_small;
        img.onclick=()=>{
            selectedTCG=c;
            document.getElementById("selected").textContent="Selected: "+c.name;
        };
        results.appendChild(img);
    });
}

function addTCG(){
    if(!selectedTCG) return alert("Select card");
    const status = document.getElementById("tcgStatus").value;
    cache[status].push({
        name:selectedTCG.name,
        type:selectedTCG.type,
        image:selectedTCG.card_images[0].image_url
    });
    save(); render();
}

function addCustom(){
    const name=document.getElementById("cName").value;
    if(!name) return;
    const status = document.getElementById("cStatus").value;
    cache[status].push({
        name,
        type:document.getElementById("cType").value,
        image:document.getElementById("cImg").value
    });
    save(); render();
}

load();
</script>

</body>
</html>
