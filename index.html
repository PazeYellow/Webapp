<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Banlist Manager</title>
<script src="config.js"></script>

<style>
:root { --dark:#121212; --gold:#d4af37; --red:#8b0000; --card-bg:#1e1e1e; }

body { font-family:Segoe UI; background:var(--dark); color:#eee; padding:10px; }
.container { max-width:1000px; margin:auto; }

.section { background:var(--card-bg); padding:15px; margin-bottom:20px; border-radius:10px; }
.forbidden { border-top:5px solid red; }
.limited { border-top:5px solid orange; }
.semi { border-top:5px solid gold; }

.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; }

.card-item {
    background:#222;
    border-radius:6px;
    overflow:hidden;
    text-align:center;
    font-size:.7em;
}

.card-item img { width:100%; }

.controls {
    display:none;
    flex-direction:column;
    gap:2px;
    padding:4px;
}

.controls button {
    font-size:10px;
    padding:3px;
    border:none;
    cursor:pointer;
}

.delete { background:#8b0000; color:white; }
.move { background:#d4af37; color:black; }

.admin { display:none; background:#2a2a2a; padding:20px; border-radius:10px; margin-top:20px; }

.search-results { display:flex; gap:10px; overflow-x:auto; padding:10px 0; }

.search-card img { width:80px; cursor:pointer; border:2px solid transparent; }
.search-card img:hover { border-color:gold; }

input, select, textarea {
    width:100%;
    margin:5px 0;
    padding:8px;
    background:#333;
    color:white;
    border:1px solid #444;
}

button {
    background:gold;
    padding:10px;
    border:none;
    cursor:pointer;
    width:100%;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;color:gold;">SYSTEM BANLIST</h1>

<div class="section forbidden">
<h2>Forbidden</h2>
<div id="forbidden-list" class="card-grid"></div>
</div>

<div class="section limited">
<h2>Limited</h2>
<div id="limited-list" class="card-grid"></div>
</div>

<div class="section semi">
<h2>Semi-Limited</h2>
<div id="semi-list" class="card-grid"></div>
</div>

<button onclick="login()">ADMIN LOGIN</button>

<div id="admin" class="admin">

<h2>TCG SEARCH</h2>
<input id="searchInput" placeholder="Search card">
<button onclick="searchTCG()">Search</button>

<div id="searchResults" class="search-results"></div>

<p id="selectedCard"></p>

<select id="tcgStatus">
<option value="forbidden">Forbidden</option>
<option value="limited">Limited</option>
<option value="semi_limited">Semi-Limited</option>
</select>

<button onclick="addTCG()">Add Official Card</button>

<hr>

<h2>CUSTOM CARD</h2>

<input id="custName" placeholder="Name">
<input id="custType" placeholder="Type">
<textarea id="custEffect" placeholder="Effect"></textarea>
<input id="custImg" placeholder="Image URL">

<select id="custStatus">
<option value="forbidden">Forbidden</option>
<option value="limited">Limited</option>
<option value="semi_limited">Semi-Limited</option>
</select>

<button onclick="addCustom()">Add Custom Card</button>

</div>

</div>

<script>

let recordCache = null;
let isAdmin = false;
let selectedTCG = null;

const BIN_ID = CONFIG.BIN_ID;
const API_KEY = CONFIG.API_KEY;
const ACCESS_KEY = CONFIG.ACCESS_KEY;

// ---------------- LOAD ONCE ----------------
async function loadBanlist() {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: {
            "X-Master-Key": API_KEY,
            "X-Access-Key": ACCESS_KEY
        }
    });

    const data = await res.json();
    recordCache = data.record;

    sanitize();
    render();
}

// ---------------- CLEAN DATA ----------------
function sanitize() {
    ["forbidden","limited","semi_limited"].forEach(k => {
        if (!Array.isArray(recordCache[k])) recordCache[k] = [];

        // remove null / broken entries
        recordCache[k] = recordCache[k].filter(c => c && c.name);
    });
}

// ---------------- SAVE ----------------
function saveToBin() {
    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "X-Master-Key": API_KEY,
            "X-Access-Key": ACCESS_KEY
        },
        body: JSON.stringify(recordCache)
    }).catch(console.error);
}

// ---------------- RENDER ----------------
function render() {

    ["forbidden","limited","semi_limited"].forEach(s => {

        const el = document.getElementById(
            s === "semi_limited" ? "semi-list" : s + "-list"
        );

        el.innerHTML = recordCache[s].map((c,i) => {

            const id = c.id || (c.name + i);

            return `
            <div class="card-item">

                <img src="${c.image || ""}">
                <div>${c.name}</div>

                <div class="controls" style="display:${isAdmin ? "flex":"none"}">

                    <button class="move" onclick="moveCard('${id}','${s}','forbidden')">F</button>
                    <button class="move" onclick="moveCard('${id}','${s}','limited')">L</button>
                    <button class="move" onclick="moveCard('${id}','${s}','semi_limited')">S</button>

                    <button class="delete" onclick="deleteCard('${id}','${s}')">X</button>

                </div>

            </div>
            `;
        }).join("");
    });
}

// ---------------- LOGIN ----------------
function login() {
    if(prompt("Password") === CONFIG.ADMIN_PASS){
        isAdmin = true;
        document.getElementById("admin").style.display="block";
        render();
    }
}

// ---------------- DELETE (SAFE) ----------------
function deleteCard(id,status){

    recordCache[status] = recordCache[status]
        .filter(c => (c.id || c.name) !== id)
        .filter(Boolean); // IMPORTANT CLEAN

    sanitize();
    saveToBin();
    render();
}

// ---------------- MOVE (SAFE) ----------------
function moveCard(id,from,to){

    const index = recordCache[from].findIndex(c => (c.id || c.name) === id);

    if(index === -1) return;

    const card = recordCache[from][index];

    recordCache[from].splice(index,1); // SAFE remove (no null holes)

    recordCache[to].push(card);

    sanitize();
    saveToBin();
    render();
}

// ---------------- ADD ----------------
function addCustom(){

    const card = {
        id: Date.now(),
        name: custName.value,
        type: custType.value,
        effect: custEffect.value,
        image: custImg.value || ""
    };

    recordCache[custStatus.value].push(card);

    sanitize();
    saveToBin();
    render();
}

// ---------------- TCG SEARCH ----------------
async function searchTCG(){

    const q = searchInput.value;

    const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(q)}`);
    const data = await res.json();

    searchResults.innerHTML = data.data.slice(0,10).map(card => `
        <div onclick='selectTCG(${JSON.stringify(card)})'>
            <img width="80" src="${card.card_images[0].image_url_small}">
        </div>
    `).join("");
}

function selectTCG(card){
    selectedTCG = card;
    selectedCard.innerText = card.name;
}

// ---------------- ADD TCG ----------------
function addTCG(){

    const card = {
        id: Date.now(),
        name: selectedTCG.name,
        type: selectedTCG.type,
        image: selectedTCG.card_images[0].image_url
    };

    recordCache[tcgStatus.value].push(card);

    sanitize();
    saveToBin();
    render();
}

loadBanlist();

</script>

</body>
</html>
