<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Banlist System</title>
<script src="config.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#0d0d0d;
    color:#eee;
}

header {
    text-align:center;
    padding:30px;
    color:#d4af37;
    font-size:28px;
    letter-spacing:4px;
    font-weight: bold;
    text-transform: uppercase;
}

.container { max-width:1100px; margin:auto; padding:10px; }

.section {
    background:#1a1a1a;
    padding:20px;
    margin-bottom:30px;
    border-radius:12px;
    border: 1px solid #333;
}

.status-title {
    color: #fff;
    font-size: 20px;
    margin-bottom: 15px;
    padding-left: 10px;
    border-left: 4px solid #d4af37;
    text-transform: uppercase;
}

.category-group {
    margin-bottom: 20px;
}

.title {
    color:#d4af37;
    margin:15px 0 8px;
    font-size:14px;
    border-bottom:1px solid #444;
    padding-bottom:4px;
    font-weight: bold;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:15px;
}

.card {
    background:#222;
    border-radius:8px;
    overflow:hidden;
    text-align:center;
    position:relative;
    transition: transform 0.2s;
}

.card:hover { transform: scale(1.03); }

.card img { width:100%; display: block; }

.name { font-size:11px; padding:6px; min-height: 30px; display: flex; align-items: center; justify-content: center; }

.controls {
    display:none;
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.9);
}

.controls button {
    width:100%;
    font-size:10px;
    border:none;
    padding:5px;
    cursor:pointer;
}

.del { background:#8b0000; color:white; }
.mv { background:#d4af37; color:black; margin-bottom: 1px; }

.admin { display:none; background:#161616; padding:20px; border-radius:10px; margin-top:20px; border: 1px dashed #d4af37; }

input,select,textarea {
    width:100%;
    margin:8px 0;
    padding:10px;
    background:#222;
    color:white;
    border:1px solid #444;
    box-sizing: border-box;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#d4af37;
    color: black;
    font-weight: bold;
    border:none;
    border-radius: 4px;
    cursor:pointer;
}

button:hover { background: #f1c40f; }

hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }

#results img { cursor: pointer; margin: 5px; border: 2px solid transparent; }
#results img:hover { border-color: #d4af37; }

</style>
</head>

<body>

<header>YGO Banlist System</header>

<div class="container">

    <div id="forbidden" class="section"></div>
    <div id="limited" class="section"></div>
    <div id="semi_limited" class="section"></div>

    <button onclick="login()">ADMIN LOGIN</button>

    <div id="admin" class="admin">
        <h3>TCG SEARCH</h3>
        <input id="searchInput" placeholder="Search card name...">
        <button onclick="searchTCG()">Search Database</button>
        <div id="results"></div>
        <p id="selected" style="color:#d4af37; font-weight:bold;"></p>

        <select id="tcgStatus">
            <option value="forbidden">Forbidden</option>
            <option value="limited">Limited</option>
            <option value="semi_limited">Semi-Limited</option>
        </select>
        <button onclick="addTCG()">Add Official Card</button>

        <hr>

        <h3>CUSTOM CARD</h3>
        <input id="cName" placeholder="Card Name">
        <input id="cType" placeholder="Type (e.g. Effect Monster, Spell, Link)">
        <textarea id="cEffect" placeholder="Effect Description"></textarea>
        <input id="cImg" placeholder="Image URL">

        <select id="cStatus">
            <option value="forbidden">Forbidden</option>
            <option value="limited">Limited</option>
            <option value="semi_limited">Semi-Limited</option>
        </select>
        <button onclick="addCustom()">Add Custom Card</button>
    </div>
</div>

<script>
let cache = null;
let admin = false;
let selectedTCG = null;

const BIN = CONFIG.BIN_ID;
const KEY = CONFIG.API_KEY;
const ACCESS = CONFIG.ACCESS_KEY;

const ORDER = [
    "Normal Monster",
    "Effect Monster",
    "Ritual",
    "Fusion",
    "Synchro",
    "Xyz",
    "Link",
    "Spell",
    "Trap"
];

const STATUS_NAMES = {
    "forbidden": "Forbidden",
    "limited": "Limited",
    "semi_limited": "Semi-Limited"
};

/* ---------------- LOAD ---------------- */
async function load(){
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN}/latest`, {
            headers: { "X-Master-Key": KEY, "X-Access-Key": ACCESS }
        });
        const data = await res.json();
        cache = data.record;
        ensure();
        render();
    } catch(e) { console.error("Load failed", e); }
}

function ensure(){
    ["forbidden", "limited", "semi_limited"].forEach(k => {
        if(!Array.isArray(cache[k])) cache[k] = [];
    });
}

/* ---------------- CATEGORY ENGINE ---------------- */
function getCategory(card){
    const t = (card.type || "").toLowerCase();

    if(t.includes("spell")) return "Spell";
    if(t.includes("trap")) return "Trap";
    if(t.includes("fusion")) return "Fusion";
    if(t.includes("synchro")) return "Synchro";
    if(t.includes("xyz")) return "Xyz";
    if(t.includes("link")) return "Link";
    if(t.includes("ritual")) return "Ritual";
    if(t.includes("normal")) return "Normal Monster";
    
    return "Effect Monster"; // Default
}

/* ---------------- RENDER ---------------- */
function render(){
    ["forbidden", "limited", "semi_limited"].forEach(zone => {
        const root = document.getElementById(zone);
        root.innerHTML = `<div class="status-title">${STATUS_NAMES[zone]}</div>`;

        // Group cards
        const grouped = {};
        cache[zone].forEach(card => {
            const cat = getCategory(card);
            if(!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(card);
        });

        // Render based on ORDER
        let hasContent = false;
        ORDER.forEach(cat => {
            const list = grouped[cat];
            if(!list || list.length === 0) return;
            hasContent = true;

            const catWrap = document.createElement("div");
            catWrap.className = "category-group";

            const title = document.createElement("div");
            title.className = "title";
            title.textContent = cat;

            const grid = document.createElement("div");
            grid.className = "grid";

            // Alphabetical Sort
            list.sort((a, b) => a.name.localeCompare(b.name)).forEach(card => {
                const el = document.createElement("div");
                el.className = "card";
                el.innerHTML = `
                    <img src="${card.image || ''}" onerror="this.src='https://via.placeholder.com/120x175?text=No+Image'">
                    <div class="name">${card.name}</div>
                    <div class="controls"></div>
                `;

                if(admin){
                    const ctrl = el.querySelector(".controls");
                    ctrl.style.display = "block";

                    const mv = document.createElement("button");
                    mv.className = "mv";
                    mv.textContent = "Change Status";
                    mv.onclick = () => {
                        const states = ["forbidden", "limited", "semi_limited"];
                        const next = states[(states.indexOf(zone) + 1) % 3];
                        cache[zone] = cache[zone].filter(c => c !== card);
                        cache[next].push(card);
                        save();
                        render();
                    };

                    const del = document.createElement("button");
                    del.className = "del";
                    del.textContent = "Remove";
                    del.onclick = () => {
                        if(confirm("Remove " + card.name + "?")){
                            cache[zone] = cache[zone].filter(c => c !== card);
                            save();
                            render();
                        }
                    };

                    ctrl.appendChild(mv);
                    ctrl.appendChild(del);
                }
                grid.appendChild(el);
            });

            catWrap.appendChild(title);
            catWrap.appendChild(grid);
            root.appendChild(catWrap);
        });

        if(!hasContent) root.innerHTML += "<p style='font-size:12px; color:#666;'>No cards in this section.</p>";
    });
}

/* ---------------- API ACTIONS ---------------- */
async function save(){
    await fetch(`https://api.jsonbin.io/v3/b/${BIN}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": KEY, "X-Access-Key": ACCESS },
        body: JSON.stringify(cache)
    });
}

function login(){
    const pass = prompt("Enter Admin Password:");
    if(pass === CONFIG.ADMIN_PASS){
        admin = true;
        document.getElementById("admin").style.display = "block";
        render();
    } else {
        alert("Incorrect Password");
    }
}

async function searchTCG(){
    const q = document.getElementById("searchInput").value;
    if(!q) return;
    const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(q)}`);
    const data = await res.json();
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if(data.data){
        data.data.slice(0, 10).forEach(c => {
            const img = document.createElement("img");
            img.src = c.card_images[0].image_url_small;
            img.width = 80;
            img.onclick = () => {
                selectedTCG = c;
                document.getElementById("selected").textContent = "Selected: " + c.name;
            };
            resultsDiv.appendChild(img);
        });
    }
}

function addTCG(){
    if(!selectedTCG) return alert("Select a card first!");
    cache[document.getElementById("tcgStatus").value].push({
        name: selectedTCG.name,
        type: selectedTCG.type,
        image: selectedTCG.card_images[0].image_url
    });
    save();
    render();
}

function addCustom(){
    const name = document.getElementById("cName").value;
    if(!name) return alert("Name required");
    cache[document.getElementById("cStatus").value].push({
        name: name,
        type: document.getElementById("cType").value,
        image: document.getElementById("cImg").value
    });
    save();
    render();
    // Clear inputs
    ["cName", "cType", "cEffect", "cImg"].forEach(id => document.getElementById(id).value = "");
}

load();
</script>

</body>
</html>
