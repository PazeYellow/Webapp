<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YGO Banlist Manager</title>
    <script src="config.js"></script>
    <style>
        :root { --dark: #121212; --gold: #d4af37; --red: #8b0000; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #eee; margin: 0; padding: 15px; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; }
        
        /* Banlist Styles */
        .section { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .forbidden { border-top: 5px solid var(--red); }
        .limited { border-top: 5px solid #ff8c00; }
        .semi { border-top: 5px solid var(--gold); }
        h2 { text-transform: uppercase; letter-spacing: 2px; margin-top: 0; display: flex; align-items: center; justify-content: space-between; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card-item { background: #252525; border-radius: 5px; overflow: hidden; text-align: center; font-size: 0.85em; transition: 0.3s; position: relative; border: 1px solid #444; }
        .card-item:hover { transform: scale(1.05); z-index: 2; border-color: var(--gold); }
        .card-item img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .card-info { padding: 8px; min-height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Admin Panel */
        .admin-panel { display: none; background: #2a2a2a; padding: 25px; border-radius: 15px; border: 2px dashed var(--gold); margin-top: 30px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        #search-results { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; border-bottom: 1px solid #444; }
        .search-res-item { min-width: 100px; cursor: pointer; opacity: 0.7; }
        .search-res-item:hover { opacity: 1; transform: translateY(-5px); }
        .search-res-item img { width: 100px; border-radius: 4px; }

        /* "The Sucky Custom Section" */
        .custom-suck { background: #000; border: 5px solid #333; padding: 20px; margin-top: 20px; position: relative; overflow: hidden; }
        .custom-suck::before { content: "UNSTABLE CUSTOM GENERATOR"; position: absolute; top: 5px; right: 5px; font-size: 10px; color: red; opacity: 0.5; }
        .custom-suck input, .custom-suck textarea { background: #111; color: lime; font-family: monospace; border: 1px solid #00ff0033; margin: 10px 0; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        button { background: var(--gold); color: black; padding: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; border-radius: 6px; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .login-btn { margin-top: 50px; opacity: 0.3; background: transparent; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; padding: 20px 0;">
        <h1 style="color:var(--gold); margin:0;">LEGACY BANLIST</h1>
        <p style="font-size:0.9em; opacity:0.6;">TCG Official + Community Customs</p>
    </header>
    
    <div id="banlist-content">
        <div class="section forbidden"><h2>Forbidden <span id="count-forbidden" style="font-size:0.5em;"></span></h2><div id="forbidden-list" class="card-grid"></div></div>
        <div class="section limited"><h2>Limited <span id="count-limited" style="font-size:0.5em;"></span></h2><div id="limited-list" class="card-grid"></div></div>
        <div class="section semi"><h2>Semi-Limited <span id="count-semi" style="font-size:0.5em;"></span></h2><div id="semi-list" class="card-grid"></div></div>
    </div>

    <button class="login-btn" onclick="showLogin()">Access Core Systems</button>
    
    <div id="admin-area" class="admin-panel">
        <h2 style="color:var(--gold)">Database Editor</h2>
        
        <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:20px;">
            <h3>1. Search Official TCG Cards</h3>
            <div class="search-box">
                <input type="text" id="tcgSearchQuery" placeholder="Search card name (e.g. 'Blue-Eyes')">
                <button style="width:100px" onclick="searchTCG()">Search</button>
            </div>
            <div id="search-results"></div>
            <select id="tcgStatus">
                <option value="forbidden">Forbidden</option>
                <option value="limited">Limited</option>
                <option value="semi_limited">Semi-Limited</option>
            </select>
            <p id="selected-card-name" style="color:var(--gold); font-weight:bold;"></p>
            <button onclick="addSelectedTCG()" id="add-tcg-btn" disabled>Add Selected Official Card</button>
        </div>

        <div class="custom-suck">
            <h3 style="color:lime; font-family:monospace;">2. RAW CUSTOM OVERRIDE</h3>
            <p style="font-size:0.7em; color:red;">Warning: Manual entry required. No validation.</p>
            <input type="text" id="custName" placeholder="[CARD_NAME]">
            <input type="text" id="custType" placeholder="[TYPE/LEVEL]">
            <textarea id="custEffect" rows="3" placeholder="[ORACLE_TEXT]"></textarea>
            <input type="text" id="custImg" placeholder="[IMAGE_URL_LINK]">
            <select id="custStatus">
                <option value="forbidden">Forbidden</option>
                <option value="limited">Limited</option>
                <option value="semi_limited">Semi-Limited</option>
            </select>
            <button style="background:red; color:white;" onclick="addCustom()">UPLOAD ILLEGAL DATA</button>
        </div>
    </div>
</div>

<script>
    const BIN_ID = CONFIG.BIN_ID;
    const API_KEY = CONFIG.API_KEY;
    const ADMIN_PASS = CONFIG.ADMIN_PASS;
    let selectedTCGCard = null;

    async function loadBanlist() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            const data = await res.json();
            renderList(data.record);
        } catch (e) { console.error("Load failed", e); }
    }

    function renderList(list) {
        ['forbidden', 'limited', 'semi_limited'].forEach(status => {
            const idMap = { 'semi_limited': 'semi-list', 'forbidden': 'forbidden-list', 'limited': 'limited-list' };
            const container = document.getElementById(idMap[status]);
            document.getElementById('count-' + status.split('_')[0]).innerText = `(${list[status].length})`;
            
            container.innerHTML = list[status].map(card => `
                <div class="card-item" title="${card.effect || ''}">
                    <img src="${card.image}" onerror="this.src='https://images.ygoprodeck.com/images/cards/73734803.jpg'">
                    <div class="card-info">${card.name}</div>
                </div>
            `).join('');
        });
    }

    // SEARCH LOGIC
    async function searchTCG() {
        const query = document.getElementById('tcgSearchQuery').value;
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = "Searching...";
        
        try {
            const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            resultsDiv.innerHTML = data.data.slice(0, 10).map(card => `
                <div class="search-res-item" onclick='selectCard(${JSON.stringify(card).replace(/'/g, "&apos;")})'>
                    <img src="${card.card_images[0].image_url_small}">
                </div>
            `).join('');
        } catch (e) { resultsDiv.innerHTML = "No cards found."; }
    }

    function selectCard(card) {
        selectedTCGCard = card;
        document.getElementById('selected-card-name').innerText = "Selected: " + card.name;
        document.getElementById('add-tcg-btn').disabled = false;
    }

    async function addSelectedTCG() {
        if(!selectedTCGCard) return;
        const status = document.getElementById('tcgStatus').value;
        const newCard = {
            name: selectedTCGCard.name,
            type: selectedTCGCard.type,
            image: selectedTCGCard.card_images[0].image_url
        };
        await pushToDB(newCard, status);
    }

    async function addCustom() {
        const name = document.getElementById('custName').value;
        const status = document.getElementById('custStatus').value;
        if(!name) return alert("Custom card needs a name.");
        
        const newCard = {
            name: name,
            type: document.getElementById('custType').value,
            effect: document.getElementById('custEffect').value,
            image: document.getElementById('custImg').value
        };
        await pushToDB(newCard, status);
    }

    async function pushToDB(cardObj, status) {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            let data = await res.json();
            data.record[status].push(cardObj);

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(data.record)
            });
            alert("Database Updated!");
            location.reload();
        } catch (e) { alert("Error updating database."); }
    }

    function showLogin() {
        if(prompt("System Password:") === ADMIN_PASS) {
            document.getElementById('admin-area').style.display = 'block';
            location.hash = "admin-area";
        }
    }

    loadBanlist();
</script>

</body>
</html>
