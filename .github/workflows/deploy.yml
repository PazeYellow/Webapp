name: Secure Deploy

on:
  push:
    branches:
      - main  # Change this to 'master' if your main branch uses that name

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This gives the script permission to create and update the gh-pages branch
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Secrets into config.js
        run: |
          sed -i "s|REPLACE_BIN_ID|${{ secrets.BIN_ID }}|g" config.js
          sed -i "s|REPLACE_API_KEY|${{ secrets.API_KEY }}|g" config.js
          sed -i "s|REPLACE_ACCESS_KEY|${{ secrets.ACCESS_KEY }}|g" config.js
          sed -i "s|REPLACE_ADMIN_PASS|${{ secrets.ADMIN_PASS }}|g" config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .        # Deploys the current directory
          branch: gh-pages # This is the branch the live site will run from